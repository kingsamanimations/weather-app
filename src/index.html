<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Weather App</title>
</head>
<body>
    <form>
        <label for="search">WHAT'S THE WEATHER IN YOUR LOCATION?</label>
        <input type="text" id="search-city" class="search-city" name="search-city" placeholder="Enter City:" required />
        <input type="text" id="search-state" class="search-state" name="search-state" placeholder="Enter State:" required />
        <input type="text" id="search-country" class="search-country" name="search-country" placeholder="Enter Country Code:" required />
        <button type="button" class="search-button">SEARCH</button>
        <button type="reset" class="reset-button">CLEAR</button>
    </form>
    <div class="weather-wrapper">
        <div class="display-div"></div>
    </div>
    <img id="weather-icon" src="" alt="weather icon" />
</body>
</html>
